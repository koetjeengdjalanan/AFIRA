services:
  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: ${DOCKER_INFLUXDB_INIT_MODE}
      DOCKER_INFLUXDB_INIT_USERNAME: ${DOCKER_INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${DOCKER_INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${DOCKER_INFLUXDB_INIT_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  # afira-service:
  #   build:
  #     context: ./.docker
  #     dockerfile: afira.dockerfile
  #   depends_on:
  #     influxdb:
  #       condition: service_healthy
  #   env_file:
  #     - .env
  #   working_dir: /app
  #   command: ["./venv/bin/python", "main.py"]
  #   volumes:
  #     - afira-volumes:/app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_RENDERING_SERVER_URL: ${GF_RENDERING_SERVER_URL}
      GF_RENDERING_CALLBACK_URL: ${GF_RENDERING_CALLBACK_URL}
      GF_RENDERING_RENDERER_TOKEN: ${GF_RENDERING_RENDERER_TOKEN}
    # depends_on:
    #   afira-service:
    #     condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 120s

  renderer:
    image: grafana/grafana-image-renderer:latest
    environment:
      AUTH_TOKEN: ${GF_RENDERING_RENDERER_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/healthz || exit -1"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s


volumes:
  influxdb-data:
  grafana-data:
  afira-volumes: