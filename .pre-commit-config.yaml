default_stages: [pre-commit]

repos:
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=120"]

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        args: ["--line-length=120"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff

  - repo: local
    hooks:
      - id: uv-export
        name: Export production requirements.txt
        entry: bash -c 'uv export --format requirements-txt --no-hashes --no-dev --output-file requirements.txt && git add requirements.txt'
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

      - id: uv-export-dev
        name: Export dev.requirements.txt
        entry: bash -c 'uv export --format requirements-txt --no-hashes --only-group code --only-group dev --output-file dev.requirements.txt && git add dev.requirements.txt'
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

      - id: pytest
        name: Run tests
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
